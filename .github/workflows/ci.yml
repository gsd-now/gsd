name: CI

on:
  push:
    branches: ['**']
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Check if we should run CI at all
  # Skip if on master and no changes to crates/ or libs/ since main
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history to compare with main
      - name: Check for changes
        id: check
        run: |
          # Always run on main, tags, or PRs
          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || \
             [[ "${{ github.ref }}" == refs/tags/* ]] || \
             [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Running: on main, tag, or PR"
            exit 0
          fi

          # On other branches (like master), check if crates/ or libs/ changed since main
          if git rev-parse origin/main >/dev/null 2>&1; then
            CHANGES=$(git diff --name-only origin/main...HEAD -- crates/ libs/ Cargo.lock Cargo.toml)
            if [[ -n "$CHANGES" ]]; then
              echo "should_run=true" >> $GITHUB_OUTPUT
              echo "Running: changes detected in crates/ or libs/"
              echo "$CHANGES"
            else
              echo "should_run=false" >> $GITHUB_OUTPUT
              echo "Skipping: no changes to crates/ or libs/ since main"
            fi
          else
            # Can't find main, run to be safe
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Running: cannot find origin/main for comparison"
          fi

  # Gate job - all other jobs depend on this
  # When skipped, all downstream jobs are also skipped
  gate:
    needs: changes
    if: needs.changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: echo "CI gate passed, running all jobs"

  fmt:
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    needs: [gate, build-linux-x64]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
      - uses: Swatinem/rust-cache@v2
      - name: Download agent_pool binary
        uses: actions/download-artifact@v4
        with:
          name: agent_pool-linux-x64
          path: target/debug
      - name: Make binary executable
        run: chmod +x target/debug/agent_pool
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run tests
        # Run single-threaded to avoid inotify race conditions
        env:
          AGENT_POOL: ${{ github.workspace }}/target/debug/agent_pool
        run: cargo test --workspace -- --nocapture --test-threads=1

  demos:
    needs: [gate, build-linux-x64]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Download agent_pool binary
        uses: actions/download-artifact@v4
        with:
          name: agent_pool-linux-x64
          path: bin
      - name: Download gsd binary
        uses: actions/download-artifact@v4
        with:
          name: gsd-linux-x64
          path: bin
      - name: Make binaries executable
        run: chmod +x bin/agent_pool bin/gsd
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq bc
      - name: Check .dot files are up-to-date
        env:
          GSD: ${{ github.workspace }}/bin/gsd
        run: ./scripts/generate-graphs.sh --check
      - name: Run all demos
        env:
          AGENT_POOL: ${{ github.workspace }}/bin/agent_pool
          GSD: ${{ github.workspace }}/bin/gsd
        run: ./scripts/run-all-demos.sh

  build-macos-x64:
    needs: gate
    runs-on: macos-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Cache binaries
        id: cache-binaries
        uses: actions/cache@v4
        with:
          path: |
            target/x86_64-apple-darwin/release/agent_pool
            target/x86_64-apple-darwin/release/gsd
          key: macos-x64-${{ hashFiles('Cargo.lock', 'crates/**') }}
      - uses: dtolnay/rust-toolchain@1.93.1
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        if: steps.cache-binaries.outputs.cache-hit != 'true'
      - name: Write version files
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: |
          if [[ "$GITHUB_REF" =~ ^refs/tags/v ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-main-${GITHUB_SHA::8}"
          fi
          echo "$VERSION" > libs/agent_pool/version.txt
          echo "$VERSION" > libs/gsd/version.txt
      - name: Build
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: cargo build --release --target x86_64-apple-darwin -p agent_pool_cli -p gsd_cli
      - uses: actions/upload-artifact@v4
        with:
          name: agent_pool-macos-x64
          path: target/x86_64-apple-darwin/release/agent_pool
      - uses: actions/upload-artifact@v4
        with:
          name: gsd-macos-x64
          path: target/x86_64-apple-darwin/release/gsd

  build-macos-arm64:
    needs: gate
    runs-on: macos-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Cache binaries
        id: cache-binaries
        uses: actions/cache@v4
        with:
          path: |
            target/aarch64-apple-darwin/release/agent_pool
            target/aarch64-apple-darwin/release/gsd
          key: macos-arm64-${{ hashFiles('Cargo.lock', 'crates/**') }}
      - uses: dtolnay/rust-toolchain@1.93.1
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        if: steps.cache-binaries.outputs.cache-hit != 'true'
      - name: Write version files
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: |
          if [[ "$GITHUB_REF" =~ ^refs/tags/v ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-main-${GITHUB_SHA::8}"
          fi
          echo "$VERSION" > libs/agent_pool/version.txt
          echo "$VERSION" > libs/gsd/version.txt
      - name: Build
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: cargo build --release --target aarch64-apple-darwin -p agent_pool_cli -p gsd_cli
      - uses: actions/upload-artifact@v4
        with:
          name: agent_pool-macos-arm64
          path: target/aarch64-apple-darwin/release/agent_pool
      - uses: actions/upload-artifact@v4
        with:
          name: gsd-macos-arm64
          path: target/aarch64-apple-darwin/release/gsd

  build-linux-x64:
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Cache binaries
        id: cache-binaries
        uses: actions/cache@v4
        with:
          path: |
            target/x86_64-unknown-linux-musl/release/agent_pool
            target/x86_64-unknown-linux-musl/release/gsd
          key: linux-x64-${{ hashFiles('Cargo.lock', 'crates/**') }}
      - uses: dtolnay/rust-toolchain@1.93.1
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install musl-tools
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: Swatinem/rust-cache@v2
        if: steps.cache-binaries.outputs.cache-hit != 'true'
      - name: Write version files
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: |
          if [[ "$GITHUB_REF" =~ ^refs/tags/v ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-main-${GITHUB_SHA::8}"
          fi
          echo "$VERSION" > libs/agent_pool/version.txt
          echo "$VERSION" > libs/gsd/version.txt
      - name: Build
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: cargo build --release --target x86_64-unknown-linux-musl -p agent_pool_cli -p gsd_cli
      - uses: actions/upload-artifact@v4
        with:
          name: agent_pool-linux-x64
          path: target/x86_64-unknown-linux-musl/release/agent_pool
      - uses: actions/upload-artifact@v4
        with:
          name: gsd-linux-x64
          path: target/x86_64-unknown-linux-musl/release/gsd

  build-linux-arm64:
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Cache binaries
        id: cache-binaries
        uses: actions/cache@v4
        with:
          path: |
            target/aarch64-unknown-linux-musl/release/agent_pool
            target/aarch64-unknown-linux-musl/release/gsd
          key: linux-arm64-${{ hashFiles('Cargo.lock', 'crates/**') }}
      - uses: dtolnay/rust-toolchain@1.93.1
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        with:
          targets: aarch64-unknown-linux-musl
      - name: Install cross
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: cargo install cross --git https://github.com/cross-rs/cross
      - uses: Swatinem/rust-cache@v2
        if: steps.cache-binaries.outputs.cache-hit != 'true'
      - name: Write version files
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: |
          if [[ "$GITHUB_REF" =~ ^refs/tags/v ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-main-${GITHUB_SHA::8}"
          fi
          echo "$VERSION" > libs/agent_pool/version.txt
          echo "$VERSION" > libs/gsd/version.txt
      - name: Build
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: cross build --release --target aarch64-unknown-linux-musl -p agent_pool_cli -p gsd_cli
      - uses: actions/upload-artifact@v4
        with:
          name: agent_pool-linux-arm64
          path: target/aarch64-unknown-linux-musl/release/agent_pool
      - uses: actions/upload-artifact@v4
        with:
          name: gsd-linux-arm64
          path: target/aarch64-unknown-linux-musl/release/gsd

  build-windows-x64:
    needs: gate
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Cache binaries
        id: cache-binaries
        uses: actions/cache@v4
        with:
          path: |
            target/x86_64-pc-windows-msvc/release/agent_pool.exe
            target/x86_64-pc-windows-msvc/release/gsd.exe
          key: windows-x64-${{ hashFiles('Cargo.lock', 'crates/**') }}
      - uses: dtolnay/rust-toolchain@1.93.1
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        if: steps.cache-binaries.outputs.cache-hit != 'true'
      - name: Write version files
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -match '^refs/tags/v(.+)$') {
            $VERSION = $Matches[1]
          } else {
            $VERSION = "0.0.0-main-$($env:GITHUB_SHA.Substring(0,8))"
          }
          $VERSION | Out-File -FilePath libs/agent_pool/version.txt -Encoding utf8 -NoNewline
          $VERSION | Out-File -FilePath libs/gsd/version.txt -Encoding utf8 -NoNewline
      - name: Build
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: cargo build --release --target x86_64-pc-windows-msvc -p agent_pool_cli -p gsd_cli
      - uses: actions/upload-artifact@v4
        with:
          name: agent_pool-win-x64
          path: target/x86_64-pc-windows-msvc/release/agent_pool.exe
      - uses: actions/upload-artifact@v4
        with:
          name: gsd-win-x64
          path: target/x86_64-pc-windows-msvc/release/gsd.exe

  publish:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    needs: [fmt, clippy, test, demos, build-macos-x64, build-macos-arm64, build-linux-x64, build-linux-arm64, build-windows-x64]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          scope: '@gsd-now'

      - name: Download agent_pool macOS x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: agent_pool-macos-x64
          path: libs/agent_pool/artifacts/macos-x64

      - name: Download agent_pool macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: agent_pool-macos-arm64
          path: libs/agent_pool/artifacts/macos-arm64

      - name: Download agent_pool Linux x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: agent_pool-linux-x64
          path: libs/agent_pool/artifacts/linux-x64

      - name: Download agent_pool Linux arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: agent_pool-linux-arm64
          path: libs/agent_pool/artifacts/linux-arm64

      - name: Download agent_pool Windows x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: agent_pool-win-x64
          path: libs/agent_pool/artifacts/win-x64

      - name: Download gsd macOS x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: gsd-macos-x64
          path: libs/gsd/artifacts/macos-x64

      - name: Download gsd macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: gsd-macos-arm64
          path: libs/gsd/artifacts/macos-arm64

      - name: Download gsd Linux x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: gsd-linux-x64
          path: libs/gsd/artifacts/linux-x64

      - name: Download gsd Linux arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: gsd-linux-arm64
          path: libs/gsd/artifacts/linux-arm64

      - name: Download gsd Windows x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: gsd-win-x64
          path: libs/gsd/artifacts/win-x64

      - name: Make binaries executable
        run: |
          chmod +x libs/agent_pool/artifacts/macos-x64/agent_pool
          chmod +x libs/agent_pool/artifacts/macos-arm64/agent_pool
          chmod +x libs/agent_pool/artifacts/linux-x64/agent_pool
          chmod +x libs/agent_pool/artifacts/linux-arm64/agent_pool
          chmod +x libs/gsd/artifacts/macos-x64/gsd
          chmod +x libs/gsd/artifacts/macos-arm64/gsd
          chmod +x libs/gsd/artifacts/linux-x64/gsd
          chmod +x libs/gsd/artifacts/linux-arm64/gsd

      - name: Set version for main branch
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: |
          VERSION="0.0.0-main-${GITHUB_SHA::8}"
          cd libs/agent_pool
          npm version $VERSION --no-git-tag-version
          cd ../gsd
          npm version $VERSION --no-git-tag-version

      - name: Publish agent_pool to npm (main tag)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: npm publish --access public --tag main
        working-directory: libs/agent_pool
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish gsd to npm (main tag)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: npm publish --access public --tag main
        working-directory: libs/gsd
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish agent_pool to npm (latest tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --access public --tag latest
        working-directory: libs/agent_pool
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish gsd to npm (latest tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --access public --tag latest
        working-directory: libs/gsd
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
